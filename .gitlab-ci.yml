image: docker:stable

services:
  - docker:dind

stages:
  - deploy

variables:
  DOCKER_HOST: tcp://docker:2375
  DOCKER_DRIVER: overlay2
  SSH_USER: ubuntu
  SSH_HOST: 95.169.201.222
  SSH_PORT: 22

before_script:
  - apk add --no-cache openssh-client
  - eval $(ssh-agent -s)
  - mkdir -p ~/.ssh
  - chmod 700 ~/.ssh

deploy:
  stage: deploy
  script:
    # Setup SSH key
    - echo "$SSH_KEY_BASE64" | base64 -d > ~/.ssh/id_rsa
    - chmod 600 ~/.ssh/id_rsa
    - ssh-add ~/.ssh/id_rsa
    
    # Add host to known_hosts
    - ssh-keyscan -p $SSH_PORT -H $SSH_HOST >> ~/.ssh/known_hosts 2>/dev/null
    - chmod 644 ~/.ssh/known_hosts
    
    # Test SSH connection first
    - ssh -o BatchMode=yes -o ConnectTimeout=5 -p $SSH_PORT $SSH_USER@$SSH_HOST "echo 'SSH connection successful'"
    
    # Deploy
    - |
      ssh -o BatchMode=yes -p $SSH_PORT $SSH_USER@$SSH_HOST << 'EOF'
        set -e
        echo "Starting deployment..."
        cd /home/ubuntu/oilbank_ecommerce
        git pull origin main
        docker compose down && docker compose up -d --build
        echo "Deployment completed successfully"
      EOF
      
  only:
    - main
  tags:
    - oilbank
