<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>User topilmadi</title>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background:
                linear-gradient(rgba(7, 8, 10, 0.85), rgba(7, 8, 10, 0.85)),
                linear-gradient(180deg, #1a1d21 0%, #090a0c 100%);
            color: #fff;
            padding: 20px;
        }

        .card {
            width: 100%;
            max-width: 420px;
            border-radius: 28px;
            padding: 30px 20px;
            text-align: center;
            background: linear-gradient(180deg, #0f1216, #090a0d);
            border: 1px solid rgba(255,255,255,0.08);
            box-shadow: 0 25px 60px rgba(0,0,0,0.5);
        }

        .icon {
            font-size: 70px;
            margin-bottom: 15px;
        }

        .title {
            font-size: 26px;
            font-weight: 900;
            margin-bottom: 10px;
        }

        .desc {
            font-size: 14px;
            color: rgba(255,255,255,0.7);
            margin-bottom: 25px;
        }

        .btn {
            display: inline-block;
            padding: 12px 18px;
            border-radius: 14px;
            text-decoration: none;
            font-weight: 700;
            background: linear-gradient(135deg, #f26500, #d33f00);
            color: #fff;
            box-shadow: 0 12px 24px rgba(255, 90, 0, 0.3);
        }

        .brand {
            margin-bottom: 20px;
            font-size: 20px;
            font-weight: 900;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="brand">CARLAND</div>

        <div class="icon">🚫</div>

        <div class="title">Foydalanuvchi topilmadi</div>

        <div class="desc">
            Bu QR kod noto‘g‘ri, eskirgan yoki foydalanuvchi o‘chirilgan bo‘lishi mumkin.
        </div>
    </div>
</body>
</html>
