<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>User Card</title>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #4f46e5, #7c3aed, #ec4899);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .card {
            width: 100%;
            max-width: 420px;
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border-radius: 24px;
            padding: 28px 22px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.25);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.18);
        }

        .profile {
            text-align: center;
            margin-bottom: 28px;
        }

        .avatar-wrapper {
            width: 120px;
            height: 120px;
            margin: 0 auto 16px;
            border-radius: 50%;
            padding: 4px;
            background: linear-gradient(135deg, #ffffff, #f9a8d4, #c4b5fd);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.25);
        }

        .avatar {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            display: block;
            background: #fff;
        }

        .full-name {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
            line-height: 1.3;
            word-break: break-word;
        }

        .phone {
            font-size: 15px;
            opacity: 0.95;
            background: rgba(255, 255, 255, 0.12);
            display: inline-block;
            padding: 8px 14px;
            border-radius: 999px;
            word-break: break-word;
        }

        .message-box {
            margin-top: 20px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 18px;
            padding: 18px;
        }

        .message-box h3 {
            font-size: 18px;
            margin-bottom: 14px;
        }

        .field {
            margin-bottom: 14px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 600;
        }

        select {
            width: 100%;
            padding: 12px 14px;
            border-radius: 12px;
            border: none;
            outline: none;
            font-size: 15px;
            background: #fff;
            color: #111827;
        }

        button {
            width: 100%;
            padding: 13px 16px;
            border: none;
            border-radius: 14px;
            background: linear-gradient(135deg, #22c55e, #16a34a);
            color: #fff;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.25s ease;
        }

        button:hover {
            transform: translateY(-1px);
            box-shadow: 0 12px 24px rgba(34, 197, 94, 0.3);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .status {
            margin-top: 12px;
            font-size: 14px;
            text-align: center;
            min-height: 20px;
        }

        .status.success {
            color: #bbf7d0;
        }

        .status.error {
            color: #fecaca;
        }

        .status.loading {
            color: #e9d5ff;
        }

        @media (max-width: 480px) {
            .card {
                padding: 22px 16px;
            }

            .full-name {
                font-size: 21px;
            }

            .phone {
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="profile">
            <div class="avatar-wrapper">
                <img
                    class="avatar"
                    src="{% if user_info.avatar %}{{ user_info.avatar.url }}{% else %}https://via.placeholder.com/120{% endif %}"
                    alt="User image"
                    onerror="this.src='https://via.placeholder.com/120'"
                />
            </div>

            <div class="full-name">
                {% if user_info.full_name %}
                    {{ user_info.full_name }}
                {% else %}
                    F.I.O mavjud emas
                {% endif %}
            </div>

            <div class="phone">
                {% if user.phone  and share_info.phone_number_allowed%}
                    {{ user.phone_number }}
                {% else %}
                    Telefon raqam yashirilgan
                {% endif %}
            </div>
        </div>

        <div class="message-box">
            <h3>Xabar yuborish</h3>

            <div class="field">
                <label for="messageSelect">Xabar variantini tanlang</label>
                <select id="messageSelect">
                    <option value="">Tanlang...</option>
                </select>
            </div>

            <button id="sendBtn" type="button">Send</button>
            <div id="status" class="status"></div>
        </div>
    </div>

    <script>
        const USER_ID = "{{ user.id }}";

        const messageSelect = document.getElementById("messageSelect");
        const sendBtn = document.getElementById("sendBtn");
        const statusBox = document.getElementById("status");

        function setStatus(message, type = "") {
            statusBox.textContent = message;
            statusBox.className = "status";
            if (type) {
                statusBox.classList.add(type);
            }
        }

        async function fetchMessageOptions() {
            try {
                setStatus("Variantlar yuklanmoqda...", "loading");

                const response = await fetch(`https://carland.upgrow.uz/user/notification-messages/`, {
                    method: "GET",
                    headers: {
                        "Content-Type": "application/json"
                    }
                });

                if (!response.ok) {
                    throw new Error("Options fetch failed");
                }

                const data = await response.json();

                messageSelect.innerHTML = `<option value="">Tanlang...</option>`;

                const results = Array.isArray(data) ? data : (data.results || []);

                results.forEach((item) => {
                    const option = document.createElement("option");
                    option.value = item.id;
                    option.textContent = item.title || item.name || item.message || `Option ${item.id}`;
                    messageSelect.appendChild(option);
                });

                if (results.length === 0) {
                    setStatus("Hozircha variantlar yo‘q", "error");
                    return;
                }

                setStatus("");
            } catch (error) {
                console.error("Options fetch error:", error);
                setStatus("Optionlarni yuklashda xatolik", "error");
            }
        }

        async function sendMessage() {
            const selectedMessageId = messageSelect.value;

            if (!selectedMessageId) {
                setStatus("Avval bitta option tanlang", "error");
                return;
            }

            try {
                sendBtn.disabled = true;
                setStatus("Yuborilmoqda...", "loading");

                const response = await fetch(`https://carland.upgrow.uz/user/send-notification/`, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        user_id: USER_ID,
                        message_id: selectedMessageId
                    })
                });

                if (!response.ok) {
                    throw new Error("Send failed");
                }

                const result = await response.json();
                setStatus(result.message || "Xabar muvaffaqiyatli yuborildi", "success");
                messageSelect.value = "";
            } catch (error) {
                console.error("Send error:", error);
                setStatus("Xabar yuborishda xatolik", "error");
            } finally {
                sendBtn.disabled = false;
            }
        }

        sendBtn.addEventListener("click", sendMessage);
        fetchMessageOptions();
    </script>
</body>
</html>
