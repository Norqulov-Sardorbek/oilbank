<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>User Card</title>

    <style>
        * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    font-family: Arial, sans-serif;
}

/* 🔥 BODY */
body {
    min-height: 100vh;
    background: #f5f6f8;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
}

/* 🔥 CARD */
.card {
    width: 100%;
    max-width: 420px;
    background: #ffffff;
    border-radius: 20px;
    padding: 24px 18px;
    box-shadow: 0 8px 24px rgba(0, 0, 0, 0.06);
    color: #1f2937;
}

/* 🔥 PROFILE */
.profile {
    text-align: center;
    margin-bottom: 24px;
}

/* 🔥 AVATAR */
.avatar-wrapper {
    width: 110px;
    height: 110px;
    margin: 0 auto 14px;
    border-radius: 50%;
    padding: 3px;
    background: linear-gradient(135deg, #ff7a18, #ff5722);
}

.avatar {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    object-fit: cover;
    background: #fff;
}

/* 🔥 NAME */
.full-name {
    font-size: 22px;
    font-weight: 700;
    margin-bottom: 6px;
    color: #111827;
}

/* 🔥 PHONE */
.phone {
    font-size: 14px;
    background: #f1f5f9;
    padding: 6px 12px;
    border-radius: 999px;
    color: #475569;
    display: inline-block;
}

/* 🔥 MESSAGE BOX */
.message-box {
    margin-top: 20px;
    background: #f9fafb;
    border-radius: 16px;
    padding: 16px;
}

/* 🔥 TITLE */
.message-box h3 {
    font-size: 16px;
    margin-bottom: 12px;
    color: #111827;
}

/* 🔥 FIELD */
.field {
    margin-bottom: 12px;
}

label {
    display: block;
    margin-bottom: 6px;
    font-size: 13px;
    font-weight: 600;
    color: #374151;
}

/* 🔥 SELECT */
select {
    width: 100%;
    padding: 10px 12px;
    border-radius: 10px;
    border: 1px solid #e5e7eb;
    outline: none;
    font-size: 14px;
    background: #fff;
    color: #111827;
}

/* 🔥 BUTTON */
button {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 12px;
    background: linear-gradient(135deg, #ff7a18, #ff5722);
    color: #fff;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: 0.2s ease;
}

button:hover {
    transform: translateY(-1px);
    box-shadow: 0 8px 18px rgba(255, 87, 34, 0.3);
}

button:disabled {
    opacity: 0.6;
    cursor: not-allowed;
}

/* 🔥 STATUS */
.status {
    margin-top: 10px;
    font-size: 13px;
    text-align: center;
}

.status.success {
    color: #16a34a;
}

.status.error {
    color: #dc2626;
}

.status.loading {
    color: #f97316;
}
.phone {
    margin-top: 8px;
}

.phone-link {
    display: inline-block;
    padding: 8px 14px;
    border-radius: 999px;
    background: linear-gradient(135deg, #ff7a18, #ff5722);
    color: white;
    font-weight: 600;
    font-size: 14px;
    text-decoration: none;
    transition: 0.2s ease;
}

.phone-link:hover {
    transform: translateY(-1px);
    box-shadow: 0 6px 14px rgba(255, 87, 34, 0.3);
}

.phone.disabled {
    background: #f1f5f9;
    color: #9ca3af;
    padding: 8px 14px;
    border-radius: 999px;
    font-size: 14px;
}

/* 🔥 MOBILE */
@media (max-width: 480px) {
    .card {
        padding: 20px 14px;
    }

    .full-name {
        font-size: 20px;
    }
    
}
    </style>
</head>
<body>
    <div class="card">
        <div class="profile">
            <div class="avatar-wrapper">
                <img
                    class="avatar"
                    src="{% if user_info.avatar %}{{ user_info.avatar.url }}{% else %}https://via.placeholder.com/120{% endif %}"
                    alt="User image"
                    onerror="this.src='https://via.placeholder.com/120'"
                />
            </div>

            <div class="full-name">
                {% if user_info.full_name %}
                    {{ user_info.full_name }}
                {% else %}
                    F.I.O mavjud emas
                {% endif %}
            </div>

           {% if user.phone and share_info.phone_number_allowed %}
                <div class="phone">
                    <a href="tel:{{ user.phone }}" class="phone-link">
                        📞 {{ user.phone }}
                    </a>
                </div>
            {% else %}
                <div class="phone disabled">
                    🔒 Telefon raqam yashirilgan
                </div>
            {% endif %}
        </div>

        <div class="message-box">
            <h3>Xabar yuborish</h3>

            <div class="field">
                <label for="messageSelect">Xabar variantini tanlang</label>
                <select id="messageSelect">
                    <option value="">Tanlang...</option>
                </select>
            </div>

            <button id="sendBtn" type="button">Send</button>
            <div id="status" class="status"></div>
        </div>
    </div>

    <script>
        const USER_ID = "{{ user.id }}";

        const messageSelect = document.getElementById("messageSelect");
        const sendBtn = document.getElementById("sendBtn");
        const statusBox = document.getElementById("status");

        function setStatus(message, type = "") {
            statusBox.textContent = message;
            statusBox.className = "status";
            if (type) {
                statusBox.classList.add(type);
            }
        }

        async function fetchMessageOptions() {
            try {
                setStatus("Variantlar yuklanmoqda...", "loading");

                const response = await fetch(`https://carland.upgrow.uz/user/notification-messages/`, {
                    method: "GET",
                    headers: {
                        "Content-Type": "application/json"
                    }
                });

                if (!response.ok) {
                    throw new Error("Options fetch failed");
                }

                const data = await response.json();

                messageSelect.innerHTML = `<option value="">Tanlang...</option>`;

                const results = Array.isArray(data) ? data : (data.results || []);

                results.forEach((item) => {
                    const option = document.createElement("option");
                    option.value = item.id;
                    option.textContent = item.message_uz || item.message_ru || item.message_en || `Option ${item.id}`;
                    messageSelect.appendChild(option);
                });

                if (results.length === 0) {
                    setStatus("Hozircha variantlar yo‘q", "error");
                    return;
                }

                setStatus("");
            } catch (error) {
                console.error("Options fetch error:", error);
                setStatus("Optionlarni yuklashda xatolik", "error");
            }
        }

        async function sendMessage() {
            const selectedMessageId = messageSelect.value;

            if (!selectedMessageId) {
                setStatus("Avval bitta option tanlang", "error");
                return;
            }

            try {
                sendBtn.disabled = true;
                setStatus("Yuborilmoqda...", "loading");

                const response = await fetch(`https://carland.upgrow.uz/user/send-notification/`, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        user_id: USER_ID,
                        message_id: selectedMessageId
                    })
                });

                if (!response.ok) {
                    throw new Error("Send failed");
                }

                const result = await response.json();
                setStatus(result.message || "Xabar muvaffaqiyatli yuborildi", "success");
                messageSelect.value = "";
            } catch (error) {
                console.error("Send error:", error);
                setStatus("Xabar yuborishda xatolik", "error");
            } finally {
                sendBtn.disabled = false;
            }
        }

        sendBtn.addEventListener("click", sendMessage);
        fetchMessageOptions();
    </script>
</body>
</html>
